name: Flutter Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: prod
        type: choice
        options:
          - prod
          - test
          - dev
      api_base_url:
        description: API base URL
        required: true
        default: https://api.example.com/api/v1/
  push:
    tags:
      - 'flutter-v*'

env:
  FLUTTER_VERSION: '3.41.2'
  APP_DISPLAY_NAME: '新西彩订单管理'

jobs:
  build-web:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.profile || 'prod' }}

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=APP_PROFILE=${{ github.event.inputs.profile || 'prod' }} \
            --dart-define=APP_API_BASE_URL=${{ github.event.inputs.api_base_url }}

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-${{ github.event.inputs.profile || 'prod' }}
          path: build/web/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:jammy

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Linux
        run: |
          flutter build linux --release \
            --dart-define=APP_PROFILE=${{ github.event.inputs.profile || 'prod' }} \
            --dart-define=APP_API_BASE_URL=${{ github.event.inputs.api_base_url }}

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-linux-${{ github.event.inputs.profile || 'prod' }}
          path: build/linux/x64/release/bundle/
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: |
          flutter build windows --release

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-${{ github.event.inputs.profile || 'prod' }}
          path: build/windows/runner/Release/
          retention-days: 30

  release:
    needs: [build-web, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') }}
          files: |
            release/flutter-web-*/**
            release/flutter-linux-*/**
            release/flutter-windows-*/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
