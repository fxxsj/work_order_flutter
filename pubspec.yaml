name: work_order_app
description: 工单管理系统（Work Order ERP）
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  flutter_colorpicker: ^1.0.3
  dio: ^5.4.0
  file_picker: ^11.0.2
  yaml: ^3.1.2
  json_annotation: ^4.9.0
  url_launcher: ^6.0.3
  go_router: ^17.2.3
  provider: ^6.1.2
  shared_preferences: ^2.2.0
  web: ^1.1.1
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - config/
    - assets/images/
    - PRIVACY
  fonts:
    - family: BowlbyDisplay
      fonts:
        - asset: assets/fonts/BowlbyOneSC-Regular.ttf
    - family: AGENCYR
      fonts:
        - asset: assets/fonts/AGENCYR.TTF
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Black.ttf
