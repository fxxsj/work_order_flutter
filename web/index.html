<!DOCTYPE html>
<html>

<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
    -->

    <base href="/work_order_app/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="新西彩订单管理">
    <link rel="stylesheet" type="text/css" href="index.css">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <title>新西彩订单管理</title>
    <link rel="manifest" href="manifest.json">
</head>

<body oncontextmenu="return false;">
<!-- 页面加载时显示 loading -->
<div id="loading">
    <div class="spinner">
        <div class="re1"></div>
        <div class="re2"></div>
        <div class="re3"></div>
        <div class="re4"></div>
        <div class="re5"></div>
    </div>
    <div class="info">
        <p>加载中...</p>
        <p>初次加载资源比较慢</p>
    </div>
</div>
<script>
  (function () {
    var loading = document.getElementById('loading');
    var hidden = false;

    function hideLoading() {
      if (!loading || hidden) return;
      hidden = true;
      loading.style.display = 'none';
    }

    window.addEventListener('flutter-first-frame', hideLoading);
    window.addEventListener('flutter-app-run', hideLoading);

    setTimeout(function () {
      if (!loading || hidden) return;
      var info = loading.querySelector('.info');
      if (info) {
        info.innerHTML = '<p>加载超时，请刷新页面</p><p>如仍无响应，请检查后端服务</p>';
      }
    }, 12000);
  })();
</script>
 
<script src="flutter_bootstrap.js" async></script>
</body>

</html>
